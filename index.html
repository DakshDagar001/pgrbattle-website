<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PGR Battle — Official Download</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Poppins;
background:#050816;
color:white;
overflow-x:hidden;
}

/* BACKGROUND */
body::before{
content:"";
position:fixed;
inset:0;
background:
linear-gradient(rgba(5,8,22,.92),rgba(5,8,22,.96)),
url("https://i.pinimg.com/736x/da/30/4a/da304a2255f08fb542d54245d969a641.jpg");
background-size:cover;
background-position:center;
z-index:-2;
}

/* HERO */
.hero{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:40px 20px;
}

.container{
max-width:900px;
width:100%;
}

/* LOGO */
.logo{
width:140px;
margin:20px auto;
display:block;
filter:drop-shadow(0 0 15px #00eaff);
}

/* TITLE */
.hero h1{
font-size:40px;
font-weight:900;
line-height:1.4;
background:linear-gradient(90deg,#00eaff,#ff00c8);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* TEXT */
.hero p{
margin-top:15px;
font-size:18px;
color:#cbd5e1;
line-height:1.6;
}

/* BUTTON */
.download-btn{
display:inline-block;
margin-top:30px;
padding:16px 40px;
font-size:18px;
font-weight:700;
border-radius:50px;
background:linear-gradient(45deg,#ff00c8,#00eaff);
color:white;
text-decoration:none;
transition:.3s;
}

.download-btn:hover{
transform:scale(1.05);
}

/* FEATURES */
.features{
max-width:1100px;
margin:60px auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:rgba(255,255,255,0.05);
padding:25px;
border-radius:15px;
text-align:center;
}

/* SCREENSHOTS */
.screenshot-section{
text-align:center;
margin:80px auto;
}

.carousel-wrapper{
overflow:hidden;
max-width:800px;
margin:auto;
}

.carousel-track{
display:flex;
transition:0.6s;
}

.slide{
min-width:100%;
}

.slide img{
width:100%;
max-height:420px;
object-fit:cover;
border-radius:15px;
}

/* FOOTER */
footer{
text-align:center;
padding:30px;
color:#94a3b8;
}

</style>
</head>

<body>

<section class="hero">
  <div class="container">

    <h1>INDIA'S TOP BEST FREE FIRE TOURNAMENT APP PGR BATTLE</h1>

    <img src="20260303_100149.png" class="logo">

    <p>
      Join PGR Battle to play daily Free Fire matches, win real cash, and become a champion.
    </p>

    <a class="download-btn"
    href="https://github.com/DakshDagar001/pgrbattle-website/releases/download/v1.0-alpha/PGRBattle.apk">
    Download PGR BATTLE
    </a>

  </div>
</section>

<section class="features">
  <div class="card">⚡ Daily Free Fire Matches</div>
  <div class="card">💰 Win Real Cash Rewards</div>
  <div class="card">🛡 100% Fair Play</div>
  <div class="card">🚀 Instant Withdrawals</div>
</section>

<section class="screenshot-section">

<h2>App Screenshots</h2>

<div class="carousel-wrapper">
  <div class="carousel-track" id="track">

    <div class="slide"><img src="screenshot1.jpg"></div>
    <div class="slide"><img src="screenshot2.jpg"></div>
    <div class="slide"><img src="screenshot3.jpg"></div>

  </div>
</div>

</section>

<footer>
© 2026 PGR Battle
</footer>

<script>
let i = 0;
const track = document.getElementById("track");
const slides = document.querySelectorAll(".slide");

setInterval(()=>{
  i = (i + 1) % slides.length;
  track.style.transform = `translateX(-${i*100}%)`;
},3000);
</script>

</body>
</html>
